services:
  expenseowl:
    build: .
    container_name: expenseowl-fork
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/New_York
      - NODE_TZ=America/New_York
    volumes:
      - ./data:/app/data
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro